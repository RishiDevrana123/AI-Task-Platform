apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-task-platform
  labels:
    app.kubernetes.io/part-of: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  CORS_ORIGIN: "https://ai-tasks.example.com"
  JWT_EXPIRES_IN: "7d"
  REDIS_URL: "redis://redis-service:6379"
  MONGO_URI: "mongodb://mongo-service:27017/ai_task_platform"
