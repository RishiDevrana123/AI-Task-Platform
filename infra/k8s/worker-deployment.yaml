apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-task-platform
  labels:
    app: worker
    app.kubernetes.io/part-of: ai-task-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: YOUR_DOCKERHUB_USER/ai-task-worker:latest
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
          resources:
            requests:
              cpu: "150m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
          # Workers don't serve HTTP, so use exec probes
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r = redis.from_url('redis://redis-service:6379'); r.ping()"
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import redis; r = redis.from_url('redis://redis-service:6379'); r.ping()"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
