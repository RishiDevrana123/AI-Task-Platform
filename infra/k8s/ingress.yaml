apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-task-ingress
  namespace: ai-task-platform
  labels:
    app.kubernetes.io/part-of: ai-task-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: ai-tasks.example.com
      http:
        paths:
          # Backend API — /api/* → backend-service:5000
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Frontend — everything else → frontend-service:80
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
  tls:
    - hosts:
        - ai-tasks.example.com
      secretName: ai-task-tls
